<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Dhiral & Sanam — Seating</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FAF7F2;
      --warm-white: #FDF9F4;
      --oxblood: #4A0E0E;
      --oxblood-light: #6B1A1A;
      --gold: #B8973A;
      --gold-light: #D4AF5A;
      --text-dark: #1C1008;
      --text-mid: #5C4A32;
      --text-soft: #9C8A72;
      --border: rgba(184,151,58,0.25);
      --shadow: 0 4px 32px rgba(74,14,14,0.08);
    }

    html { background: var(--oxblood); }

    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header {
      background: var(--oxblood);
      padding: 36px 24px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 120%, rgba(184,151,58,0.15) 0%, transparent 70%);
    }

    .header-ornament {
      color: var(--gold);
      font-size: 18px;
      letter-spacing: 0.3em;
      margin-bottom: 12px;
      opacity: 0.7;
    }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 32px;
      color: #FDF9F4;
      letter-spacing: 0.05em;
      line-height: 1.1;
    }

    .header h1 span {
      color: var(--gold-light);
      font-style: italic;
    }

    .header-date {
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(253,249,244,0.45);
      font-weight: 400;
    }

    .divider-line {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      margin: 0;
    }

    .divider-line::before,
    .divider-line::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gold);
      opacity: 0.3;
    }

    .divider-diamond {
      color: var(--gold);
      font-size: 10px;
      opacity: 0.6;
    }

    /* ── SEARCH SECTION ── */
    .search-section {
      padding: 28px 20px 20px;
      background: var(--warm-white);
    }

    .search-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 10px;
      display: block;
    }

    .search-wrap {
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 16px 48px 16px 18px;
      font-family: 'Jost', sans-serif;
      font-size: 17px;
      font-weight: 300;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      box-shadow: 0 2px 12px rgba(74,14,14,0.05);
    }

    .search-input:focus {
      border-color: var(--gold);
    }

    .search-input::placeholder {
      color: var(--text-soft);
      font-style: italic;
    }

    .search-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-soft);
      font-size: 18px;
      pointer-events: none;
    }

    /* ── RESULT CARD ── */
    .result-card {
      margin: 0 20px 20px;
      background: var(--oxblood);
      border-radius: 6px;
      padding: 24px 22px;
      text-align: center;
      box-shadow: var(--shadow);
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-card.not-found {
      background: #fff;
      border: 1.5px solid var(--border);
    }

    .result-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 300;
      font-style: italic;
      color: #FDF9F4;
      margin-bottom: 6px;
    }

    .result-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(253,249,244,0.5);
      margin-bottom: 14px;
    }

    .result-table-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 72px;
      font-weight: 300;
      color: var(--gold-light);
      line-height: 1;
    }

    .result-table-word {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(253,249,244,0.5);
      margin-top: 4px;
    }

    .result-tablemates {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(184,151,58,0.2);
    }

    .result-tablemates-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(253,249,244,0.4);
      margin-bottom: 8px;
    }

    .result-tablemates-names {
      font-size: 13px;
      color: rgba(253,249,244,0.7);
      line-height: 1.8;
      font-weight: 300;
    }

    .not-found-msg {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-style: italic;
      color: var(--text-mid);
      margin-bottom: 6px;
    }

    .not-found-sub {
      font-size: 13px;
      color: var(--text-soft);
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--warm-white);
      padding: 0 20px;
    }

    .tab {
      flex: 1;
      padding: 14px 8px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      color: var(--text-soft);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
      font-weight: 400;
    }

    .tab.active {
      color: var(--oxblood);
      border-bottom-color: var(--gold);
    }

    /* ── TABLE GRID ── */
    .tables-grid {
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .table-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 16px 14px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .table-card:hover, .table-card:active {
      border-color: var(--gold);
      box-shadow: 0 2px 16px rgba(184,151,58,0.15);
    }

    .table-card-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      color: var(--oxblood);
      line-height: 1;
    }

    .table-card-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 10px;
    }

    .table-card-guests {
      font-size: 12px;
      color: var(--text-mid);
      line-height: 1.7;
      font-weight: 300;
    }

    /* ── EXPANDED TABLE VIEW ── */
    .table-detail {
      position: fixed;
      inset: 0;
      background: var(--cream);
      z-index: 100;
      overflow-y: auto;
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }

    .table-detail-header {
      background: var(--oxblood);
      padding: 24px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      background: none;
      border: none;
      color: rgba(253,249,244,0.7);
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .table-detail-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      color: #FDF9F4;
    }

    .table-detail-title span {
      color: var(--gold-light);
      font-style: italic;
    }

    .table-detail-guests {
      padding: 24px 20px;
    }

    .guest-row {
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      font-size: 16px;
      color: var(--text-dark);
      font-weight: 300;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .guest-row:last-child { border-bottom: none; }

    .guest-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
      opacity: 0.6;
    }

    /* ── FOOTER ── */
    .footer {
      padding: 24px 20px;
      text-align: center;
      font-size: 11px;
      color: var(--text-soft);
      letter-spacing: 0.1em;
    }

    /* ── HIDDEN UTIL ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
  <h1><span>Dhiral</span> &amp; <span>Sanam</span></h1>
  <div class="header-date">May 30, 2026 &nbsp;·&nbsp; The Ballantyne, Charlotte</div>
</div>

<!-- SEARCH -->
<div class="search-section">
  <span class="search-label">Find your seat</span>
  <div class="search-wrap">
    <input
      type="text"
      class="search-input"
      id="searchInput"
      placeholder="Enter your name…"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
    <span class="search-icon">⌕</span>
  </div>
</div>

<!-- RESULT -->
<div id="resultCard" class="hidden"></div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" id="tabGrid" onclick="switchTab('grid')">All Tables</div>
</div>

<!-- TABLES GRID -->
<div class="tables-grid" id="tablesGrid"></div>

<!-- TABLE DETAIL OVERLAY -->
<div class="table-detail hidden" id="tableDetail">
  <div class="table-detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <div class="table-detail-title" id="detailTitle"></div>
  </div>
  <div class="table-detail-guests" id="detailGuests"></div>
</div>

<!-- FOOTER -->
<div class="footer">The Ballantyne Hotel &nbsp;·&nbsp; Charlotte, NC</div>

<script>
// ─────────────────────────────────────────────
//  SEATING DATA
//  To update: replace the arrays inside TABLES.
//  Each key is the table label; value is an array of guest names.
//  Names should match how guests will type them (first + last).
// ─────────────────────────────────────────────
const TABLES = {
  "1":  ["Anshul Doshi","Karan Das","Shalin Mehta","Rushil Shah","Saumil Kothari","Pavan Manilal","Naman Shah","Chirag Aswani","Grace Schoenhoff"],
  "2":  ["Mana Jhaveri","Pranil Vora","Ayushi Shah","Avya Vora","Nirali Sheth","Ann Cox","Derek Mei","Christy Park","Brett Moretzky","Caitlin Vanderberg"],
  "3":  ["Dveet Patel","Maddie Patel","Kareena Patel","Chandni Patel","Jash Patel","Janvi Patel","Krishna Patel","Kangna Patel"],
  "4":  ["Alay Patel","Nirali Patel","Naman Patel","Ishan Patel","Ramilaben Patel","Rashmi Patel","Devendra Patel","Saajan Patel","Ashok Patel","Komal Patel","Ishita Patel"],
  "5":  ["Aarti Shukla","Chirag Shukla","Avya Shukla","Puja Patel","Aakash Patel","Samantha Patel","Kush Pandya","Mansi Pandya","Mehaanya Pandya"],
  "6":  ["Mehul Shah","Mita Shah","Ketan Doshi","Manisha Doshi","Sujit Das","Hena Das","Sagar Mehta","Sejal Mehta","Nimish Mehta","Pinaki Mehta"],
  "7":  ["Shreena Shah","Saira Shah","Shanaya Shah","Sanika Shah","Payal Shah","Kokila Shah","Neel Shah","Aneri Doshi","Kiara Kothari"],
  "8":  ["Sanjay Shah","Kavita Shah","Snehal Kothari","Mona Kothari","Nilesh Sheth","Purvi Sheth","Nimish Bhatt","Naina Bhatt","Parag Vora","Priti Vora"],
  "9":  ["Shekhar Bhansali","Prita Bhansali","Sunil Doshi","Avni Doshi","Nitin Jobanputra","Rupa Jobanputra","Parag Vora","Chirag Patel"],
  "10": ["Nipa Patel","Dhavanay Patel","Rupangi Patel","Tanha Patel","Vipul Patel","Chirag Patel","Neeraj Patel","Sonal Patel","Amrish Patel","Aashni Patel"],
  "11": ["Nita Patel","Snehal Patel","Harsha Patel","Pranav Patel","Reshma Patel","Milan Patel","Viral Pandya","Preeti Pandya"],
  "12": ["Ambalal Patel","Jyostna Patel","Babu Patel","Shashi Patel","Dashrat Patel","Sushila Patel","Gordan Patel","Kusum Patel","Narendra Patel","Uma Patel"],
  "13": ["Renuka Patel","Kaushik Patel"]
};

// Build a flat lookup: normalized name → { table, displayName, tablemates[] }
const lookup = {};

Object.entries(TABLES).forEach(([tableNum, guests]) => {
  guests.forEach(name => {
    if (!name) return;
    const displayName = name.replace(/\s*\(.*?\)/g, '').trim(); // strip "(infant)" etc
    const key = normalize(displayName);
    lookup[key] = {
      table: tableNum,
      displayName,
      tablemates: guests
        .filter(g => g && normalize(g.replace(/\s*\(.*?\)/g,'').trim()) !== key)
        .map(g => g.replace(/\s*\(.*?\)/g,'').trim())
    };
  });
});

function normalize(str) {
  return str.toLowerCase().replace(/[^a-z]/g, '');
}

// ── SEARCH ──
const searchInput = document.getElementById('searchInput');
const resultCard  = document.getElementById('resultCard');

searchInput.addEventListener('input', () => {
  const val = searchInput.value.trim();
  if (val.length < 2) { resultCard.classList.add('hidden'); return; }
  const match = findGuest(val);
  renderResult(match, val);
});

function findGuest(query) {
  const q = normalize(query);
  // Exact match first
  if (lookup[q]) return lookup[q];
  // Partial match (starts-with)
  const keys = Object.keys(lookup);
  let best = null;
  for (const k of keys) {
    if (k.startsWith(q)) { best = lookup[k]; break; }
  }
  if (best) return best;
  // Contains match
  for (const k of keys) {
    if (k.includes(q)) { best = lookup[k]; break; }
  }
  return best;
}

function renderResult(match, query) {
  resultCard.classList.remove('hidden');
  if (!match) {
    resultCard.className = 'result-card not-found';
    resultCard.innerHTML = `
      <div class="not-found-msg">Name not found</div>
      <div class="not-found-sub">Try a different spelling, or scroll below to find your table.</div>
    `;
    return;
  }
  resultCard.className = 'result-card';
  const tmHtml = match.tablemates.length
    ? `<div class="result-tablemates">
        <div class="result-tablemates-label">Also at your table</div>
        <div class="result-tablemates-names">${match.tablemates.join(' &nbsp;·&nbsp; ')}</div>
       </div>`
    : '';
  resultCard.innerHTML = `
    <div class="result-label">Welcome,</div>
    <div class="result-name">${match.displayName}</div>
    <div class="result-table-num">${match.table}</div>
    <div class="result-table-word">Your Table</div>
    ${tmHtml}
  `;
}

// ── RENDER TABLE GRID ──
const grid = document.getElementById('tablesGrid');

Object.entries(TABLES).forEach(([num, guests]) => {
  const card = document.createElement('div');
  card.className = 'table-card';
  const names = guests.filter(Boolean).map(g => g.replace(/\s*\(.*?\)/g,'').trim());
  card.innerHTML = `
    <div class="table-card-num">${num}</div>
    <div class="table-card-label">Table</div>
    <div class="table-card-guests">${names.join('<br>')}</div>
  `;
  card.addEventListener('click', () => openDetail(num, names));
  grid.appendChild(card);
});

// ── TABLE DETAIL ──
function openDetail(num, guests) {
  document.getElementById('detailTitle').innerHTML = `Table <span>${num}</span>`;
  const guestHtml = guests.map(g => `
    <div class="guest-row"><span class="guest-dot"></span>${g}</div>
  `).join('');
  document.getElementById('detailGuests').innerHTML = guestHtml;
  document.getElementById('tableDetail').classList.remove('hidden');
  window.scrollTo(0,0);
}

function closeDetail() {
  document.getElementById('tableDetail').classList.add('hidden');
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
}
</script>
</body>
</html>
